<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ForexPro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0D0D0D;
            color: #FFFFFF;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(13, 13, 13, 0.98);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .navbar .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            color: #FFFFFF;
        }
        .logo span { color: #6C63FF; }
        .logo small { font-size: 12px; color: #6C63FF; font-weight: 400; margin-left: 5px; }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
            gap: 4px;
        }
        .hamburger span {
            width: 28px;
            height: 2px;
            background: #FFFFFF;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
            list-style: none;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 6px;
        }
        .nav-links a:hover {
            color: #FFFFFF;
            background: rgba(108, 99, 255, 0.1);
        }
        .nav-links a.active {
            color: #6C63FF;
            background: rgba(108, 99, 255, 0.1);
        }

        .btn-nav {
            background: linear-gradient(135deg, #6C63FF, #00D4FF);
            color: #FFFFFF !important;
            padding: 8px 25px !important;
            border-radius: 25px !important;
            font-weight: 700 !important;
        }
        .btn-nav:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(108, 99, 255, 0.3);
        }

        .nav-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }
        .nav-overlay.active { display: block; }

        .risk-banner {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #888;
            padding: 8px 20px;
            text-align: center;
            font-size: 11px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .risk-banner strong { color: #6C63FF; }

        .login-container {
            max-width: 420px;
            margin: 50px auto;
            padding: 40px 35px;
            background: #1A1A1A;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .login-container .brand-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        .login-container h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
        }
        .login-container h1 span { color: #6C63FF; }
        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            color: #888;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6C63FF;
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.05);
        }

        .forgot-password {
            text-align: right;
            margin-top: 6px;
        }
        .forgot-password a {
            color: #666;
            font-size: 13px;
            text-decoration: none;
        }
        .forgot-password a:hover { color: #6C63FF; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6C63FF, #00D4FF);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(108, 99, 255, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .login-footer a {
            color: #6C63FF;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid #FF1744;
            color: #FF6B81;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .error-message.show { display: block; }

        .success-message {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid #00E676;
            color: #69F0AE;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .success-message.show { display: block; }

        .admin-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .admin-link a {
            color: #666;
            text-decoration: none;
            font-size: 13px;
        }
        .admin-link a:hover { color: #6C63FF; }

        @media (max-width: 480px) {
            .login-container {
                margin: 20px 15px;
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="risk-banner">
        ⚠️ <strong>RISK WARNING:</strong> Forex trading carries substantial risk. Only trade with funds you can afford to lose.
    </div>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Forex<span>Pro</span><small>🇿🇦</small></a>
            <button class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="market.html">Market</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html" class="btn-nav">Sign Up</a></li>
            </ul>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>

    <div class="login-container">
        <div class="brand-icon">🔐</div>
        <h1>Welcome <span>Back</span></h1>
        <p class="subtitle">Login to your account</p>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="password" placeholder="Enter your password" required minlength="8" autocomplete="current-password">
                <div class="forgot-password"><a href="#">Forgot password?</a></div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">🚀 Login</button>
        </form>

        <div class="login-footer">Don't have an account? <a href="register.html">Sign Up</a></div>
        <div class="admin-link">👑 <a href="admin-login.html">Admin Login</a></div>
    </div>

    <script>
        const API_URL = 'https://forexpro-1.onrender.com/api';

        const token = localStorage.getItem('token');
        if (token) {
            fetch(`${API_URL}/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) window.location.href = 'dashboard.html';
            }).catch(() => localStorage.removeItem('token'));
        }

        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const navOverlay = document.getElementById('navOverlay');

        if (hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
                navOverlay.classList.toggle('active');
                document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
            });
        }

        if (navOverlay) {
            navOverlay.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        }

        document.querySelectorAll('.nav-links a').forEach(item => {
            item.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                navOverlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            btn.disabled = true;
            btn.textContent = '⏳ Logging in...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    successDiv.textContent = '✅ Login successful! Redirecting...';
                    successDiv.classList.add('show');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    errorDiv.textContent = '❌ ' + (data.error || 'Login failed');
                    errorDiv.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '🚀 Login';
                }
            } catch (error) {
                errorDiv.textContent = '❌ Connection error. Make sure the server is running.';
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = '🚀 Login';
            }
        }
    </script>
</body>
</html>
